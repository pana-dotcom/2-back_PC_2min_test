<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2-back Task</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

/* 共通表示エリア */
#letter {
    font-size: 80px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 30px;
    line-height: 1;

    width: 120px;
    margin-left: auto;
    margin-right: auto;
}

/* ×表示 */
.fixation {
    color: white;
    background: gray;
    border-radius: 10px;
}

/* 判定表示 */
#feedback {
    font-size: 28px;
    font-weight: bold;
    height: 40px;
    margin-top: 10px;
}

.correct {
    color: blue;
}

.incorrect {
    color: red;
}
</style>
</head>

<body>

<h2>2-back</h2>

<button id="startBtn">スタート</button>

<div id="game" style="display:none;">
    <div id="letter">✖</div>

    <div id="feedback"></div>

    <p>2つ前の文字と一致時はEnterキーを押す</p>
</div>

<script>

let sequence = [];
let index = 0;
let logs = [];
let responded = false;

let baseLetters = ["B","F","K","H","M","Q","R","T"];

let timeLimit = 120;
let timeLeft = timeLimit;
let gameTimer;

let isRunning = false;

let keyLocked = false;

let letterDuration = 500;
let fixationDuration = 2000;

const startBtn = document.getElementById("startBtn");
const game = document.getElementById("game");
const letterDiv = document.getElementById("letter");
const feedbackDiv = document.getElementById("feedback");

startBtn.addEventListener("click", () => {
    startBtn.style.display = "none";
    game.style.display = "block";
    startGame();
});

function showFixation() {
    letterDiv.innerText = "✖";
    letterDiv.classList.add("fixation");
}

function showStimulus(letter) {
    letterDiv.innerText = letter;
    letterDiv.classList.remove("fixation");
}

function startGame() {

    isRunning = true;

    sequence = [];
    index = 0;
    logs = [];

    timeLeft = timeLimit;

    gameTimer = setInterval(countDown, 1000);

    showFixation();

    setTimeout(() => {
        if (!isRunning) return;
        nextTrial();
    }, fixationDuration);
}

function countDown() {

    timeLeft--;

    if (timeLeft <= 0) {
        endGame();
    }
}

function nextTrial() {

    if (!isRunning) return;

    /* 前回判定を消去 */
    feedbackDiv.innerText = "";
    feedbackDiv.className = "";

    responded = false;

    let base =
        baseLetters[Math.floor(Math.random() * baseLetters.length)];

    let letter =
        Math.random() < 0.5 ? base.toLowerCase() : base;

    sequence.push(letter);

    showStimulus(letter);

    index++;

    /* 刺激提示 0.5秒 */
    setTimeout(() => {

        if (!isRunning) return;

        showFixation();

        /* 注視点 2.0秒 */
        setTimeout(() => {

            if (!isRunning) return;

            /* 反応なしの場合も正誤表示 */
            if (!responded) {

                if (index >= 3) {

                    let current = sequence[index - 1];
                    let back2 = sequence[index - 3];

                    let match =
                        current.toLowerCase() === back2.toLowerCase();

                    if (match) {
                        feedbackDiv.innerText = "× 不正解";
                        feedbackDiv.className = "incorrect";
                    }
                    else {
                        feedbackDiv.innerText = "○ 正解";
                        feedbackDiv.className = "correct";
                    }
                }

                evaluate(false);
            }

            nextTrial();

        }, fixationDuration);

    }, letterDuration);
}

document.addEventListener("keydown", (e) => {

    if (e.key !== "Enter") return;
    if (keyLocked) return;

    keyLocked = true;

    response();
});

document.addEventListener("keyup", (e) => {

    if (e.key === "Enter") {
        keyLocked = false;
    }
});

function response() {

    if (!isRunning) return;
    if (responded) return;

    responded = true;

    if (index >= 3) {

        let current = sequence[index - 1];
        let back2 = sequence[index - 3];

        let match =
            current.toLowerCase() === back2.toLowerCase();

        if (match) {
            feedbackDiv.innerText = "○ 正解";
            feedbackDiv.className = "correct";
        }
        else {
            feedbackDiv.innerText = "× 不正解";
            feedbackDiv.className = "incorrect";
        }
    }

    evaluate(true);
}

function evaluate(clicked) {

    if (index < 3) return;

    let current = sequence[index - 1];
    let back2 = sequence[index - 3];

    let match =
        current.toLowerCase() === back2.toLowerCase();

    let hit = 0;
    let miss = 0;
    let fa = 0;
    let cr = 0;

    if (match && clicked) {
        hit = 1;
    }
    else if (match && !clicked) {
        miss = 1;
    }
    else if (!match && clicked) {
        fa = 1;
    }
    else if (!match && !clicked) {
        cr = 1;
    }

    logs.push([
        logs.length + 1,
        current,
        hit,
        miss,
        fa,
        cr
    ]);
}

function endGame() {

    isRunning = false;

    clearInterval(gameTimer);

    letterDiv.innerText = "終了";
    letterDiv.classList.remove("fixation");

    exportCSV();
}

function exportCSV() {

    let csv =
        "trial,Letter,Hit,Miss,FalseAlarm,CorrectRejection\n";

    logs.forEach(row => {
        csv += row.join(",") + "\n";
    });

    let blob =
        new Blob([csv], { type: "text/csv" });

    let link =
        document.createElement("a");

    let now = new Date();

    let YYYY = now.getFullYear();
    let MM = String(now.getMonth() + 1).padStart(2,"0");
    let DD = String(now.getDate()).padStart(2,"0");
    let hh = String(now.getHours()).padStart(2,"0");
    let mm = String(now.getMinutes()).padStart(2,"0");

    let filename =
        `n-back_${YYYY}${MM}${DD}_${hh}${mm}.csv`;

    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}

</script>

</body>
</html>
