<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2-back Task</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

#letter {
    font-size: 80px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 30px auto;
    line-height: 1;
    width: 120px;
}

.fixation {
    color: white;
    background: gray;
    border-radius: 10px;
}

#feedback {
    font-size: 36px;
    height: 50px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>2-back</h2>

<button id="startBtn">スタート</button>

<div id="game" style="display:none;">
    <div id="letter">✖</div>

    <p>2つ前の文字と一致時はEnterキーを押す</p>

    <div id="feedback"></div>
</div>

<script>

let sequence = [];
let index = 0;
let logs = [];
let responded = false;

const baseLetters = ["B","F","K","H","M","Q","R","T"];

const timeLimit = 120;
let timeLeft = timeLimit;
let gameTimer;

let isRunning = false;
let keyLocked = false;

const letterDuration = 500;
const fixationDuration = 2000;

const startBtn = document.getElementById("startBtn");
const game = document.getElementById("game");
const letterDiv = document.getElementById("letter");
const feedback = document.getElementById("feedback");

startBtn.addEventListener("click", () => {
    startBtn.style.display = "none";
    game.style.display = "block";
    startGame();
});

function showFixation() {
    letterDiv.innerText = "✖";
    letterDiv.classList.add("fixation");
}

function showStimulus(letter) {
    letterDiv.innerText = letter;
    letterDiv.classList.remove("fixation");
}

function startGame() {

    isRunning = true;

    sequence = [];
    index = 0;
    logs = [];

    timeLeft = timeLimit;

    gameTimer = setInterval(countDown, 1000);

    showFixation();

    setTimeout(() => {
        if (!isRunning) return;
        nextTrial();
    }, fixationDuration);
}

function countDown() {

    timeLeft--;

    if (timeLeft <= 0) {
        endGame();
    }
}

function nextTrial() {

    if (!isRunning) return;

    feedback.innerText = "";

    responded = false;

    let base =
        baseLetters[
            Math.floor(Math.random() * baseLetters.length)
        ];

    let letter =
        Math.random() < 0.5
            ? base.toLowerCase()
            : base;

    sequence.push(letter);

    showStimulus(letter);

    index++;

    setTimeout(() => {

        if (!isRunning) return;

        if (!responded) {
            evaluate(false);
        }

        showFixation();

        setTimeout(() => {
            if (!isRunning) return;
            nextTrial();
        }, fixationDuration);

    }, letterDuration);
}

document.addEventListener("keydown", (e) => {

    if (e.key !== "Enter") return;
    if (keyLocked) return;

    keyLocked = true;

    response();
});

document.addEventListener("keyup", (e) => {

    if (e.key === "Enter") {
        keyLocked = false;
    }
});

function response() {

    if (!isRunning) return;
    if (responded) return;

    responded = true;

    evaluate(true);
}

function evaluate(clicked) {

    if (index < 3) return;

    const current = sequence[index - 1];
    const back2 = sequence[index - 3];

    const match =
        current.toLowerCase() ===
        back2.toLowerCase();

    let hit = 0;
    let miss = 0;
    let fa = 0;
    let cr = 0;

    if (match && clicked) {

        hit = 1;

        feedback.innerText = "正解";
        feedback.style.color = "green";

    }
    else if (match && !clicked) {

        miss = 1;

    }
    else if (!match && clicked) {

        fa = 1;

        feedback.innerText = "不正解";
        feedback.style.color = "red";

    }
    else {

        cr = 1;

    }

    logs.push([
        logs.length + 1,
        hit,
        miss,
        fa,
        cr
    ]);
}

function endGame() {

    isRunning = false;

    clearInterval(gameTimer);

    letterDiv.innerText = "終了";
    letterDiv.classList.remove("fixation");

    feedback.innerText = "";

    exportCSV();
}

function exportCSV() {

    let csv =
        "trial,Hit,Miss,FalseAlarm,CorrectRejection\n";

    logs.forEach(row => {
        csv += row.join(",") + "\n";
    });

    const blob =
        new Blob([csv], {
            type: "text/csv"
        });

    const link =
        document.createElement("a");

    const now = new Date();

    const YYYY = now.getFullYear();
    const MM = String(now.getMonth() + 1).padStart(2, "0");
    const DD = String(now.getDate()).padStart(2, "0");
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");

    const filename =
        `n-back_${YYYY}${MM}${DD}_${hh}${mm}.csv`;

    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}

</script>

</body>
</html>
